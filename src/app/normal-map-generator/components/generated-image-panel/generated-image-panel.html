<vui-card>
    @let imageValue = image();
    <vui-view padding="1rem" rowGap="0.85rem">
        <vui-view flexDirection="row" alignItems="center" width="100%" style="width: 100%">
            <vui-text size="large">Generated Image</vui-text>
            @if (imageValue) {
                <vui-view flexDirection="row" columnGap="0.5rem" alignItems="center">
                    <vui-button (click)="onExport()" [lean]="true">
                        <vui-view flexDirection="row" columnGap="0.5rem" alignItems="center">
                            <vui-icon icon="export"></vui-icon>
                            <vui-text>Export</vui-text>
                        </vui-view>
                    </vui-button>
                    <vui-button (click)="onRemoveImage()" [lean]="true">
                        <vui-view flexDirection="row" columnGap="0.5rem" alignItems="center">
                            <vui-icon icon="remove"></vui-icon>
                            <vui-text>Clear</vui-text>
                        </vui-view>
                    </vui-button>
                </vui-view>
            }
        </vui-view>
        <vui-card cardStyle="dark">
            @if (imageValue) {
                <vui-image [url]="imageValue" width="30rem" height="30rem"></vui-image>
            } @else {
                <vui-view width="30rem" height="30rem" alignItems="center" justifyContent="center">
                    <vui-text>Import light images and generate normal map.</vui-text>
                </vui-view>
            }
        </vui-card>
    </vui-view>
</vui-card>
