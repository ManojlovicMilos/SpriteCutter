<div class="header-strip">
    <vui-text size="large">Spriteset Editor</vui-text>
</div>
<vui-view padding="1rem 1rem" height="14rem" width="calc(100vw - 4rem)" flexDirection="row" justifyContent="flex-start" columnGap="0.75rem">
    <spc-image-imports-list></spc-image-imports-list>
    <spc-io-settings-switcher (changed)="onChangeView($event)"></spc-io-settings-switcher>
    @if (selectedView === 'import') {
        <spc-spriteset-structure-selector></spc-spriteset-structure-selector>
        <spc-io-data-structure-editor [value]="importDataConfig()" (changed)="onChangeImportDataConfig($event)"></spc-io-data-structure-editor>
    }
    @if (selectedView === 'export') {
        <spc-image-exports-panel></spc-image-exports-panel>
        <spc-io-data-structure-editor [value]="exportDataConfig()" (changed)="onChangeExportDataConfig($event)"></spc-io-data-structure-editor>
    }
</vui-view>
<div class="separator"></div>
<vui-view padding="1.5rem 1rem" height="calc(100vh - 15.75rem)" width="calc(100vw - 4rem)" [scrollable]="true">
    <spc-animations-overview></spc-animations-overview>
</vui-view>
