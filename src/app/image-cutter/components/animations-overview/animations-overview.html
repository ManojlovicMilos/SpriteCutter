<vui-view rowGap="0.5rem" width="100%" justifyContent="flex-start">
    @let animationImageData = animationSeparatedData();
    @for (animation of animationConfigs(); track animation.name; let i = $index) {
        <spc-animation-strip
            [directions]="directions()"
            [animationConfig]="animation"
            [animationData]="animationImageData[i]"
            [displayDirection]="displayDirection()">
        </spc-animation-strip>
    }
</vui-view>
